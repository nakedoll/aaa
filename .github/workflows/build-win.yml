name: Windows EXE 빌드

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Python 3.11 설치 (node-gyp 필요, 3.12는 distutils 제거됨)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: MSVC 개발 환경 설정
        uses: ilammy/msvc-dev-cmd@v1

      - name: 의존성 설치 (postinstall 제외)
        run: npm ci --ignore-scripts

      - name: better-sqlite3 Electron용 재빌드
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Electron 앱 빌드
        run: npm run build

      - name: Windows EXE 패키징
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: kcea-member-manager-windows
          path: dist/*.exe
          retention-days: 30
